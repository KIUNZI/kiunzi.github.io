<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kiunzi</title>
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <header class="page-header">
      <h1>Kiunzi</h1>
      <p class="subtitle">
        Demo and exploratory projects hosted on GitHub Pages
      </p>
    </header>

    <main class="container">

      <section>
        <h2>Projects</h2>

        <ul class="card-grid">
          <li class="card">
            <a href="/movies/">
              <span class="card-title">Movies</span>
              <span class="card-meta">
                Demo application and UI experiments
              </span>
            </a>
          </li>
          <li class="card">
            <a href="/utilities/">
              <span class="card-title">Utilities</span>
              <span class="card-meta">
                Utility libraries for use in microservices
              </span>
            </a>
          </li>
        </ul>
      </section>

    </main>

    <footer>
      <p>
        Hosted on GitHub Pages ·
        <time id="ts"></time>
      </p>
    </footer>

    <script>
      document.getElementById("ts").textContent =
        new Date().toISOString().replace("T", " ").replace("Z", " UTC");
    </script>
  </body>
</html>
